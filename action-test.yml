name: Act Local Test

on:
  workflow_dispatch:

jobs:
  test-action:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Run local action
        uses: ./
        with:
          repo: mysten/sui-node
          filter: ^mainnet-v([0-9]+\.[0-9]+\.[0-9]+)$
          max_pages: 2
